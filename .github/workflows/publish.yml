name: Publish Homey app

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homey-release
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: homey-app-store

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate release
        uses: athombv/github-action-homey-app-validate@002b7273c2b86032cb20d9bf25a67c8daca13f2c # v1
        with:
          level: publish

      - name: Publish to Homey App Store
        id: publish
        uses: athombv/github-action-homey-app-publish@48be66b7f2f870c22b6117d7bb84dfa06c4fc309 # v1
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: Add publication summary
        env:
          HOMEY_RELEASE_URL: ${{ steps.publish.outputs.url }}
        run: echo "Manage the Homey release at ${HOMEY_RELEASE_URL}." >> "$GITHUB_STEP_SUMMARY"
