name: Version Homey app

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: Semantic version increment
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      changelog:
        type: string
        description: English App Store changelog entry
        required: true

permissions:
  contents: write

concurrency:
  group: homey-release
  cancel-in-progress: false

jobs:
  version:
    name: Version, validate, and create release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Update Homey app version
        id: version
        uses: athombv/github-action-homey-app-version@3342f092b437550e78074797b52fac6467a456e1 # v2
        with:
          version: ${{ inputs.version }}
          changelog: ${{ inputs.changelog }}

      - name: Validate release
        uses: athombv/github-action-homey-app-validate@002b7273c2b86032cb20d9bf25a67c8daca13f2c # v1
        with:
          level: publish

      - name: Commit and tag version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json package.json package-lock.json .homeychangelog.json
          git commit -m "Update Homey App Version to v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ inputs.changelog }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --title "v${VERSION}" --notes "${RELEASE_NOTES}"

      - name: Add release summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "Created version and GitHub release v${VERSION}." >> "$GITHUB_STEP_SUMMARY"
